<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- SEO meta populated by JS from content.js -->
  <title>Flosswork™ Dental Clinic | Best Dentist in Raipur, Chhattisgarh</title>
  <meta name="description" content="Premium dental clinic in Choubey Colony, Raipur. Clear aligners from ₹50,000, dental implants, teeth whitening & smile design. Certified Invisalign & Toothsi partner. Trusted by 5,000+ patients." />
  <meta name="keywords"    content="dentist in raipur, dental clinic raipur, clear aligners raipur, invisible braces raipur, best dentist choubey colony, dental implants raipur, invisalign raipur" />
  <link rel="canonical"   href="https://flosswork.in/" />

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://flosswork.in/" />
  <meta property="og:title"       content="Flosswork™ Dental Clinic | Best Dentist in Raipur" />
  <meta property="og:description" content="Premium dental clinic in Choubey Colony, Raipur. Certified Invisalign & Toothsi partner. Clear aligners from ₹50,000." />
  <meta property="og:image"       content="https://flosswork.in/images/seo/og-home.jpg" />
  <meta name="twitter:card"       content="summary_large_image" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

<!-- ① NAVBAR -->
<header class="navbar" id="navbar" role="banner"></header>

<!-- Mobile menu overlay -->
<div class="mobile-menu" id="mobileMenu" aria-hidden="true"></div>

<main id="main-content">

  <!-- ② HERO -->
  <section class="hero" id="home" aria-label="Hero">
    <div class="hero__bg">
      <img
        src="images/hero/hero-main.jpg"
        alt="Premium dental care at Flosswork™ Dental Clinic, Choubey Colony, Raipur"
        class="hero__img"
        loading="eager"
        fetchpriority="high"
      />
      <div class="hero__overlay" aria-hidden="true"></div>
    </div>

    <div class="hero__content container">
      <span class="badge badge--dark" id="hero-badge"></span>
      <h1 class="hero__headline" id="hero-headline"></h1>
      <p  class="hero__sub"      id="hero-sub"></p>
      <div class="hero__price-badge" id="hero-price"></div>
      <div class="hero__actions" id="hero-actions"></div>
      <div class="hero__scroll" aria-hidden="true">
        <span class="hero__scroll-line"></span>
        <span id="hero-scroll-hint"></span>
      </div>
    </div>
  </section>

  <!-- ③ TRUST BAR -->
  <div class="trust-bar" aria-label="Trust signals" role="region">
    <div class="trust-bar__track" id="trust-track"></div>
  </div>

  <!-- ④ ALIGNERS SPOTLIGHT -->
  <section class="aligners-spotlight section-pad" id="aligners" aria-label="Clear Aligners">
    <div class="container">
      <div class="aligners-spotlight__inner">
        <div class="aligners-spotlight__content">
          <span class="label" id="spotlight-label"></span>
          <h2 class="heading-display h2" id="spotlight-headline"></h2>
          <p  class="section-sub" id="spotlight-sub" style="margin-bottom:0"></p>
          <div class="aligners-spotlight__benefits" id="spotlight-benefits"></div>
          <div class="aligners-spotlight__pricing-note" id="spotlight-pricing"></div>
          <a  id="spotlight-cta" class="btn btn--primary btn--lg"></a>
        </div>
        <div class="aligners-spotlight__visual">
          <img id="spotlight-img" src="images/treatments/aligners-showcase.jpg"
               alt="Clear aligner treatment at Flosswork™ Dental Clinic, Raipur" loading="lazy" />
        </div>
      </div>
    </div>
  </section>

  <!-- ⑤ CASE GALLERY -->
  <section class="gallery section-pad" id="gallery" aria-label="Patient Case Gallery">
    <div class="container">
      <div class="section-header section-header--center">
        <span class="label" id="gallery-label"></span>
        <h2 class="heading-display h2" id="gallery-headline"></h2>
        <p  class="section-sub section-sub--center" id="gallery-sub"></p>
      </div>
      <div class="gallery__grid" id="gallery-grid"></div>
      <div style="text-align:center; margin-top:2rem;">
        <a href="about.html#gallery" class="btn btn--ghost" id="gallery-cta"></a>
      </div>
      <p class="gallery__disclaimer" id="gallery-disclaimer"></p>
    </div>
  </section>

  <!-- ⑥ PATIENT REVIEWS -->
  <section class="reviews section-pad" id="reviews" aria-label="Patient Reviews">
    <div class="container">
      <div class="section-header section-header--center">
        <span class="label" id="reviews-label"></span>
        <h2 class="heading-display h2" id="reviews-headline"></h2>
      </div>
      <div class="reviews__grid" id="reviews-grid"></div>
      <div style="text-align:center; margin-top:2.5rem;">
        <a id="reviews-cta" class="btn btn--outline" target="_blank" rel="noopener noreferrer"></a>
      </div>
    </div>
  </section>

  <!-- ⑦ FLOSSWORK+ ADVANTAGE -->
  <section class="advantage section-pad" id="advantage" aria-label="Flosswork Advantage">
    <div class="container">
      <div class="section-header section-header--center">
        <span class="label" id="adv-label"></span>
        <h2 class="heading-display h2" id="adv-headline"></h2>
        <p  class="section-sub section-sub--center" id="adv-sub"></p>
      </div>
      <div class="advantage__grid" id="adv-grid"></div>
    </div>
  </section>

  <!-- ⑧ SERVICES -->
  <section class="services section-pad" id="services" aria-label="Dental Services">
    <div class="container">
      <div class="section-header">
        <span class="label" id="svc-label"></span>
        <h2 class="heading-display h2" id="svc-headline"></h2>
        <p  class="section-sub" id="svc-sub"></p>
      </div>
      <div class="services__grid" id="svc-grid"></div>
    </div>
  </section>

  <!-- ⑨ PRODUCTS -->
  <section class="products section-pad" id="products" aria-label="Dental Products">
    <div class="container">
      <div class="section-header">
        <span class="label" id="prod-label"></span>
        <h2 class="heading-display h2" id="prod-headline"></h2>
        <p  class="section-sub" id="prod-sub"></p>
      </div>
      <div class="products__grid" id="prod-grid"></div>
    </div>
  </section>

  <!-- ⑩ ONLINE CONSULTATION BAND -->
  <section class="consult-band" id="consultation" aria-label="Online Consultation">
    <div class="consult-band__inner container">
      <h2 class="consult-band__headline" id="consult-headline"></h2>
      <p  class="consult-band__sub"      id="consult-sub"></p>
      <a  id="consult-cta" class="btn btn--white btn--lg"></a>
    </div>
  </section>

  <!-- ⑪ DOCTORS — 2 featured + Meet Our Team card -->
  <section class="doctors-home section-pad" id="doctors" aria-label="Our Specialist Doctors">
    <div class="container">
      <div class="section-header">
        <span class="label" id="doc-label"></span>
        <h2 class="heading-display h2" id="doc-headline"></h2>
        <p  class="section-sub" id="doc-sub"></p>
      </div>
      <div class="doctors-home__grid" id="doc-grid"></div>
    </div>
  </section>

  <!-- ⑫ PARTNERS -->
  <section class="partners section-pad" id="partners" aria-label="Partner Brands">
    <div class="container">
      <div class="section-header section-header--center">
        <span class="label" id="partners-label"></span>
      </div>
      <div class="partners__strip" id="partners-strip"></div>
    </div>
  </section>

  <!-- ⑬ FINAL CTA -->
  <section class="final-cta" id="book" aria-label="Book Consultation">
    <div class="final-cta__inner container">
      <h2 class="final-cta__headline" id="fcta-headline"></h2>
      <p  class="final-cta__sub"     id="fcta-sub"></p>
      <div class="final-cta__actions" id="fcta-actions"></div>
    </div>
  </section>

</main>

<!-- ⑭ FOOTER -->
<footer class="footer" id="footer" role="contentinfo"></footer>

<!-- Scripts — order matters: content → components → main → page -->
<script src="js/content.js"></script>
<script src="js/components.js"></script>
<script src="js/main.js"></script>
<script>
/* ── Page-specific render ─────────────────────────────────── */
document.addEventListener('DOMContentLoaded', function () {
  const H  = CONTENT.home;
  const C  = CONTENT.clinic;
  const WA = CONTENT.whatsappMessages;

  function waUrl(msg) {
    return `https://wa.me/${C.whatsapp}?text=${encodeURIComponent(WA[msg] || WA.general)}`;
  }

  function svgIcon(name, size) {
    const paths = CONTENT.icons;
    const p = paths[name] || paths.plan;
    const strokeIcons = ['scanner','specialist','patients','emi','equipment','plan','phone','map','calendar','check','xray','whitening','software','sterilisation','arrow'];
    const useStroke = strokeIcons.includes(name);
    return `<svg width="${size||24}" height="${size||24}" viewBox="0 0 24 24"
      fill="${useStroke?'none':'currentColor'}"
      stroke="${useStroke?'currentColor':'none'}"
      stroke-width="1.5" aria-hidden="true">${p}</svg>`;
  }

  /* Hero */
  document.getElementById('hero-badge').innerHTML =
    `<span class="badge__dot"></span>${H.hero.badge}`;
  document.getElementById('hero-headline').innerHTML =
    `${H.hero.headline}<br><em>${H.hero.headlineItalic}</em>`;
  document.getElementById('hero-sub').textContent  = H.hero.subtext;
  document.getElementById('hero-price').textContent = H.hero.priceBadge;
  document.getElementById('hero-scroll-hint').textContent = H.hero.scrollHint;
  document.getElementById('hero-actions').innerHTML = `
    <a href="tel:${C.phone.replace(/\s/g,'')}" class="btn btn--white btn--lg">
      ${svgIcon('phone',18)} ${H.hero.ctaPrimary}
    </a>
    <a href="${waUrl('scan')}" target="_blank" rel="noopener noreferrer" class="btn btn--ghost-white btn--lg">
      ${svgIcon('whatsapp',18)} ${H.hero.ctaSecondary}
    </a>`;

  /* Trust bar */
  const track = document.getElementById('trust-track');
  if (track) {
    const items = [...H.trustBar, ...H.trustBar]; // pre-duplicate
    track.innerHTML = items.map(t =>
      `<span class="trust-bar__item"><span class="trust-bar__dot"></span>${t.text}</span>`
    ).join('');
  }

  /* Aligners spotlight */
  const AS = H.alignersSpotlight;
  document.getElementById('spotlight-label').textContent = AS.label;
  document.getElementById('spotlight-headline').innerHTML = `${AS.headline}<br><em>${AS.headlineItalic}</em>`;
  document.getElementById('spotlight-sub').textContent = AS.subtext;
  document.getElementById('spotlight-pricing').textContent = AS.pricingNote;
  document.getElementById('spotlight-benefits').innerHTML = AS.benefits.map(b => `
    <div class="benefit-pill">
      <div class="benefit-pill__icon">${svgIcon('check',18)}</div>
      <div>
        <div class="benefit-pill__title">${b.title}</div>
        <div class="benefit-pill__desc">${b.desc}</div>
      </div>
    </div>`).join('');
  const spotCta = document.getElementById('spotlight-cta');
  spotCta.href        = AS.ctaLink;
  spotCta.textContent = AS.cta;

  /* Gallery */
  document.getElementById('gallery-label').textContent = H.gallery.label;
  document.getElementById('gallery-headline').innerHTML =
    `${H.gallery.headline}<br><em>${H.gallery.headlineItalic}</em>`;
  document.getElementById('gallery-sub').textContent = H.gallery.subtext;
  document.getElementById('gallery-cta').textContent  = H.gallery.viewAllCta;
  document.getElementById('gallery-disclaimer').textContent = H.gallery.disclaimer;

  document.getElementById('gallery-grid').innerHTML = H.gallery.cases.map(c => `
    <div class="ba-card">
      <div class="ba-slider" id="slider-${c.id}">
        <div class="ba-before">
          <img src="${c.beforeImage}" alt="${c.beforeAlt}" class="ba-img" loading="lazy" />
          <span class="ba-tag ba-tag--before">Before</span>
        </div>
        <div class="ba-after" style="width:50%">
          <img src="${c.afterImage}" alt="${c.afterAlt}" class="ba-img" loading="lazy" />
          <span class="ba-tag ba-tag--after">After</span>
        </div>
        <div class="ba-handle" aria-label="Drag to compare" tabindex="0" role="slider" aria-valuenow="50" aria-valuemin="4" aria-valuemax="96">
          <div class="ba-handle__circle">
            ${svgIcon('arrow',18)}
          </div>
        </div>
      </div>
      <div class="ba-caption">
        <span class="ba-caption__treatment">${c.treatment}</span>
        <span class="ba-caption__duration">${c.duration}</span>
      </div>
    </div>`).join('');

  /* Init sliders now that gallery HTML exists in the DOM */
  document.querySelectorAll('.ba-slider').forEach(window.FLOSS.initSlider);

  /* Reviews */
  document.getElementById('reviews-label').textContent = H.reviews.label;
  document.getElementById('reviews-headline').innerHTML =
    `${H.reviews.headline}<br><em>${H.reviews.headlineItalic}</em>`;
  const revCta = document.getElementById('reviews-cta');
  revCta.href        = H.reviews.viewAllLink;
  revCta.textContent = H.reviews.viewAllCta;

  document.getElementById('reviews-grid').innerHTML = H.reviews.items.map(r => `
    <div class="review-card">
      <div class="review-card__stars">
        ${'<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>'.repeat(r.rating)}
      </div>
      <p class="review-card__text">${r.text}</p>
      <div class="review-card__meta">
        <div>
          <div class="review-card__name">${r.name}</div>
          <div class="review-card__date">${r.date}</div>
        </div>
        <span class="review-card__platform">${r.platform}</span>
      </div>
    </div>`).join('');

  /* Advantage */
  const ADV = H.advantage;
  document.getElementById('adv-label').textContent    = ADV.label;
  document.getElementById('adv-headline').innerHTML   = `${ADV.headline}<br><em>${ADV.headlineItalic}</em>`;
  document.getElementById('adv-sub').textContent      = ADV.subtext;
  document.getElementById('adv-grid').innerHTML = ADV.usps.map(u => `
    <div class="usp-card">
      <div class="icon-wrap icon-wrap--md icon-wrap--primary" style="margin-bottom:1.25rem">
        ${svgIcon(u.icon, 24)}
      </div>
      <div class="usp-card__stat">${u.stat}</div>
      <h3 class="usp-card__title">${u.title}</h3>
      <p  class="usp-card__desc">${u.desc}</p>
    </div>`).join('');

  /* Services */
  const SVC = H.services;
  document.getElementById('svc-label').textContent   = SVC.label;
  document.getElementById('svc-headline').innerHTML  = `${SVC.headline}<br><em>${SVC.headlineItalic}</em>`;
  document.getElementById('svc-sub').textContent     = SVC.subtext;
  document.getElementById('svc-grid').innerHTML = SVC.items.map(s => `
    <a href="${s.link}" class="service-card">
      <div class="service-card__img">
        <img src="${s.image}" alt="${s.imageAlt}" loading="lazy" />
      </div>
      <div class="service-card__body">
        <h3 class="service-card__name">${s.name}</h3>
        <p  class="service-card__desc">${s.desc}</p>
        <span class="service-card__link">
          Learn more ${svgIcon('arrow',14)}
        </span>
      </div>
    </a>`).join('')
    + `<a href="${SVC.viewAllLink}" class="service-card service-card--cta">
        <span>${SVC.viewAllCta}</span>
        ${svgIcon('arrow',18)}
       </a>`;

  /* Products */
  const PROD = H.products;
  if (PROD.visible) {
    document.getElementById('prod-label').textContent    = PROD.label;
    document.getElementById('prod-headline').innerHTML   = `${PROD.headline}<br><em>${PROD.headlineItalic}</em>`;
    document.getElementById('prod-sub').textContent      = PROD.subtext;
    document.getElementById('prod-grid').innerHTML = PROD.items.map(p => `
      <div class="product-card">
        ${p.badge ? `<span class="product-card__badge">${p.badge}</span>` : ''}
        <div class="product-card__img">
          <img src="${p.image}" alt="${p.imageAlt}" loading="lazy" />
        </div>
        <div class="product-card__body">
          <h3 class="product-card__name">${p.name}</h3>
          <p  class="product-card__desc">${p.desc}</p>
        </div>
        <div class="product-card__footer">
          <span class="product-card__price">${p.price}</span>
          <a href="${waUrl('products')}" target="_blank" rel="noopener noreferrer"
             class="btn btn--wa btn--sm">Order</a>
        </div>
      </div>`).join('');
  } else {
    document.getElementById('products').style.display = 'none';
  }

  /* Consultation band */
  const CB = H.consultationBand;
  document.getElementById('consult-headline').textContent = CB.headline;
  document.getElementById('consult-sub').textContent      = CB.sub || CB.subtext;
  document.getElementById('consult-cta').innerHTML =
    `${svgIcon('whatsapp',20)} ${CB.cta}`;
  document.getElementById('consult-cta').href   = waUrl('general');
  document.getElementById('consult-cta').target = '_blank';
  document.getElementById('consult-cta').rel    = 'noopener noreferrer';

  /* Doctors section */
  const DS = H.doctorsSection;
  const allDoctors = CONTENT.about.doctors;
  document.getElementById('doc-label').textContent    = DS.label;
  document.getElementById('doc-headline').innerHTML   = `${DS.headline}<br><em>${DS.headlineItalic}</em>`;
  document.getElementById('doc-sub').textContent      = DS.subtext;

  const featuredDoctors = allDoctors.filter(d => DS.featuredIds.includes(d.id) && d.active);
  const docCards = featuredDoctors.map(d => `
    <a href="about.html#doctors" class="doctor-card">
      <div class="doctor-card__img">
        <img src="${d.photo}" alt="${d.photoAlt}" loading="lazy" />
      </div>
      <div class="doctor-card__body">
        <div class="doctor-card__role">${d.speciality}</div>
        <h3 class="doctor-card__name">${d.name}</h3>
        <p  class="doctor-card__qual">${d.qualification} · ${d.experience}</p>
        <div class="doctor-card__expertise">
          ${d.expertise.slice(0,3).map(e => `<span class="doctor-card__tag">${e}</span>`).join('')}
        </div>
      </div>
    </a>`).join('');

  const activeDoctorCount = allDoctors.filter(d => d.active).length;
  const teamCard = `
    <a href="${DS.meetTeamCard.ctaLink}" class="doctor-card doctor-card--team">
      <div class="doctor-card--team__icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </div>
      <div class="doctor-card--team__count">${DS.meetTeamCard.headline.split(' ')[0]}</div>
      <p class="doctor-card--team__label">${DS.meetTeamCard.subtext}</p>
      <span class="btn btn--ghost-white btn--sm">${DS.meetTeamCard.cta}</span>
    </a>`;

  document.getElementById('doc-grid').innerHTML = docCards + teamCard;

  /* Partners */
  document.getElementById('partners-label').textContent = H.partners.label;
  document.getElementById('partners-strip').innerHTML = H.partners.items.map(p => `
    <div class="partner-logo">
      <img src="${p.logo}" alt="${p.alt}" title="${p.name}" loading="lazy" />
    </div>`).join('');

  /* Final CTA */
  const FC = H.finalCta;
  document.getElementById('fcta-headline').innerHTML =
    `${FC.headline}<br><em>${FC.headlineItalic}</em>`;
  document.getElementById('fcta-sub').textContent = FC.subtext;
  document.getElementById('fcta-actions').innerHTML = `
    <a href="tel:${C.phone.replace(/\s/g,'')}" class="btn btn--primary btn--lg">
      ${svgIcon('phone',18)} ${FC.ctaPrimary}
    </a>
    <a href="${waUrl('scan')}" target="_blank" rel="noopener noreferrer" class="btn btn--ghost-white btn--lg">
      ${svgIcon('whatsapp',18)} ${FC.ctaSecondary}
    </a>`;

  /* Update document title and meta from content */
  document.title = H.seo.title;
  document.querySelector('meta[name="description"]').content = H.seo.description;
});
</script>

</body>
</html>
